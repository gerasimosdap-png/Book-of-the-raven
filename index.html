<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Book of the Raven — An Owens Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  :root{
    --ink:#0b1211; --ink2:#121d1b; --bone:#e9e3d3; --bone-dim:#a9a594;
    --accent:#c3a7e0;        /* lilac — shifts as she darkens */
    --accent-dim:#7d6b94;
    --gold:#c8a458;          /* gilt — tarnishes as she darkens */
    --salt:#cfe1e2; --rule:#2a3633; --maxw:42rem;
    --desat:0;               /* art desaturation 0..1 */
    --veil:.55;              /* vignette strength */
  }
  /* ——— corruption tiers override the palette/atmosphere ——— */
  body[data-tier="tempted"]{ --accent:#b89ad6; --gold:#bd9a50; --desat:.12; --veil:.6; }
  body[data-tier="slipping"]{ --accent:#9f86b0; --gold:#9c8348; --desat:.3; --veil:.66; --salt:#c2cdcc; }
  body[data-tier="lefthand"]{ --accent:#9c6f74; --gold:#7d6a40; --desat:.55; --veil:.74; --bone:#ded7c6; }
  body[data-tier="raven"]{ --accent:#8a4744; --gold:#5f5638; --desat:.8; --veil:.84; --bone:#d6cfbd; --ink:#080d0c; }

  /* ——— reader-comfort overrides (placed after tiers so they win) ——— */
  body.calm{ --desat:0 !important; --veil:.40 !important; }
  body.calm #scene-bg{ filter:none }
  body.parchment{
    --ink:#efe7d5 !important; --ink2:#e6dcc6; --bone:#2c2622 !important; --bone-dim:#6f6457;
    --salt:#43342c; --rule:#d4c6a8; --gold:#8a6a2c; --accent:#6b4f86; --accent-dim:#9a8aac;
    --veil:.10 !important;
    background-image:radial-gradient(120% 80% at 50% -10%, #f6efdf 0%, var(--ink) 60%) !important; }
  body.parchment #scene-bg{ opacity:.05 !important; filter:none }
  body.parchment #scene-veil{ background:radial-gradient(120% 90% at 50% 0%, rgba(120,100,70,.03), rgba(120,100,70,.09) 72%) !important }
  body.parchment .topbar{ background:linear-gradient(180deg,rgba(239,231,213,.95),transparent) }

  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--ink);color:var(--bone);
    font-family:"Spectral",Georgia,serif;font-size:calc(1.06rem * var(--rscale,1));line-height:1.72;
    -webkit-font-smoothing:antialiased;min-height:100vh;
    background-image:radial-gradient(120% 80% at 50% -10%, #16221f 0%, var(--ink) 55%);
    transition:background-color 1.2s, color 1.2s}
  img{max-width:100%;display:block}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 1.25rem 6rem;position:relative}

  #scene-bg{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;
    opacity:.06;filter:grayscale(var(--desat)) contrast(1.05);transition:opacity .8s, filter 1.2s}
  #scene-veil{position:fixed;inset:0;z-index:-1;
    background:radial-gradient(120% 90% at 50% 0%, rgba(8,12,11,calc(var(--veil) - .25)), rgba(8,12,11,var(--veil)) 72%);
    transition:background 1.2s}

  .topbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
    padding:.7rem 1rem;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--bone-dim);
    z-index:8;background:linear-gradient(180deg,rgba(8,12,11,.92),transparent)}
  .topbar .name{font-family:"Cormorant Garamond",serif;color:var(--gold);letter-spacing:.22em;transition:color 1.2s}
  .topbar .controls{display:flex;gap:.5rem}
  .topbar button{appearance:none;background:none;border:1px solid var(--rule);color:var(--bone-dim);
    border-radius:2px;padding:.3rem .6rem;font:inherit;letter-spacing:.12em;cursor:pointer}
  .topbar button:hover{color:var(--accent);border-color:var(--accent-dim)}
  .topbar .gear{font-size:.82rem}
  /* reader settings panel */
  .rpanel{position:fixed;top:2.9rem;right:.7rem;z-index:12;width:min(20rem,92vw);
    background:#0c1413;border:1px solid var(--rule);border-radius:6px;padding:.95rem 1.05rem 1.05rem;
    box-shadow:0 18px 50px rgba(0,0,0,.55);display:none;color:var(--bone);text-transform:none;letter-spacing:0}
  body.parchment .rpanel{background:#f3ecdb}
  .rpanel.open{display:block}
  .rpanel h4{font-family:"Cormorant Garamond",serif;font-weight:600;margin:0 0 .1rem;color:var(--salt);font-size:1.18rem}
  .rpanel .hint{color:var(--bone-dim);font-size:.76rem;margin:0 0 .7rem;line-height:1.5}
  .rrow{display:flex;align-items:center;justify-content:space-between;gap:.7rem;padding:.6rem 0;border-top:1px solid var(--rule)}
  .rrow .rlab{font-size:.86rem}
  .rrow .rlab small{display:block;color:var(--bone-dim);font-size:.72rem;margin-top:.12rem;line-height:1.4}
  .sizer{display:flex;align-items:center;gap:.45rem;flex:none}
  .sizer button{appearance:none;width:1.9rem;height:1.9rem;border:1px solid var(--rule);background:none;
    color:var(--bone);border-radius:3px;font:inherit;font-size:.95rem;cursor:pointer;line-height:1}
  .sizer button:hover{border-color:var(--accent);color:var(--accent)}
  .sizer .val{min-width:3.1rem;text-align:center;font-size:.74rem;color:var(--bone-dim)}
  .toggle{position:relative;width:2.6rem;height:1.5rem;border-radius:999px;border:1px solid var(--rule);
    background:#0a100f;cursor:pointer;transition:background .2s,border-color .2s;flex:none}
  body.parchment .toggle{background:#e3d8bf}
  .toggle::after{content:"";position:absolute;top:50%;left:.18rem;transform:translateY(-50%);
    width:1.05rem;height:1.05rem;border-radius:50%;background:var(--bone-dim);transition:left .2s,background .2s}
  .toggle[aria-pressed="true"]{background:color-mix(in srgb,var(--accent) 38%,transparent);border-color:var(--accent-dim)}
  .toggle[aria-pressed="true"]::after{left:calc(100% - 1.23rem);background:var(--accent)}

  /* interactive spellcraft */
  .craft{margin:.4rem 0 0}
  .ingredient{display:block;width:100%;text-align:left;margin:.45rem 0;padding:.7rem .9rem;
    background:#0e1714;border:1px solid var(--rule);border-radius:3px;color:var(--bone);cursor:pointer;
    font:inherit;transition:border-color .15s,background .15s}
  body.parchment .ingredient{background:#efe7d2}
  .ingredient:hover{border-color:var(--accent-dim)}
  .ingredient[aria-pressed="true"]{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,#0e1714)}
  .ingredient.left[aria-pressed="true"]{border-color:var(--gold);background:color-mix(in srgb,#7d1f1f 18%,#0e1714)}
  .ingredient.reverse[aria-pressed="true"]{border-color:#7fa6b6;background:color-mix(in srgb,#37606f 20%,#0e1714)}
  body.parchment .ingredient[aria-pressed="true"]{background:color-mix(in srgb,var(--accent) 14%,#efe7d2)}
  .ingredient .iname{display:block;font-family:"Cormorant Garamond",serif;font-weight:600;font-size:1.12rem;color:var(--salt)}
  .ingredient .inote{display:block;font-size:.82rem;color:var(--bone-dim);margin-top:.1rem;font-style:italic}
  .craft-status{font-style:italic;color:var(--bone-dim);text-align:center;min-height:1.5em;margin:.85rem 0 .3rem;font-size:.92rem;transition:color .3s}
  /* the readable grimoire */
  .modal-card.grim{max-width:40rem;max-height:85vh;overflow:auto;text-align:left}
  .grim h3{font-size:1.55rem;margin:0}
  .grim h4{font-family:"Cormorant Garamond",serif;color:var(--accent);font-size:1.05rem;letter-spacing:.1em;
    text-transform:uppercase;margin:1.15rem 0 .25rem;border-top:1px solid var(--rule);padding-top:.7rem}
  .grim p{margin:.3rem 0;font-size:.95rem;line-height:1.6}
  .grim .recipe{margin:.5rem 0;padding-left:.9rem;border-left:2px solid var(--rule)}
  .grim .recipe b{color:var(--salt);font-family:"Cormorant Garamond",serif;font-size:1.08rem}
  .grim .recipe.warn{border-left-color:var(--gold)}

  /* thread rail */
  #thread{position:fixed;top:0;left:max(.5rem,calc(50% - var(--maxw)/2 - 3.2rem));height:100vh;width:2.4rem;
    display:flex;flex-direction:column;align-items:center;padding-top:1.2rem;z-index:5;pointer-events:none}
  #thread .line{flex:1;width:1px;background:repeating-linear-gradient(var(--accent-dim) 0 6px,transparent 6px 12px);opacity:.5}
  #thread .stitch{width:9px;height:9px;border-radius:50%;background:var(--ink);border:1px solid var(--accent);
    margin:.1rem 0;box-shadow:0 0 8px color-mix(in srgb, var(--accent) 60%, transparent)}
  #thread .stitch.dark{border-color:var(--gold);background:#1a0f0f}
  @media(max-width:980px){#thread{display:none}}

  .eyebrow{font-family:"Cormorant Garamond",serif;font-weight:600;text-transform:uppercase;
    letter-spacing:.32em;font-size:.72rem;color:var(--gold);margin:0 0 .5rem;transition:color 1.2s}
  h1.cover-title{font-family:"Cormorant Garamond",serif;font-weight:500;
    font-size:clamp(2.7rem,10vw,4.6rem);line-height:.98;margin:.2rem 0 .4rem;color:var(--bone)}
  h2.chapter{font-family:"Cormorant Garamond",serif;font-weight:500;
    font-size:clamp(1.9rem,6.5vw,2.9rem);line-height:1.04;margin:.1rem 0 1.3rem;color:var(--salt)}

  .plate{position:relative;margin:0 auto 2rem;max-width:20rem;padding:.55rem;
    background:linear-gradient(160deg,#1c2724,#0d1614);border:1px solid var(--rule);border-radius:3px;
    box-shadow:0 18px 50px -20px rgba(0,0,0,.8), inset 0 0 0 1px color-mix(in srgb,var(--gold) 10%,transparent)}
  .plate::before,.plate::after{content:"";position:absolute;width:18px;height:18px;border:1.5px solid var(--gold);opacity:.55;transition:border-color 1.2s}
  .plate::before{top:6px;left:6px;border-right:0;border-bottom:0}
  .plate::after{bottom:6px;right:6px;border-left:0;border-top:0}
  .plate img{border-radius:2px;width:100%;filter:saturate(calc(1 - var(--desat))) contrast(1.02);transition:filter 1.2s}

  .body p{margin:0 0 1.15rem}
  .body p.lead::first-letter{font-family:"Cormorant Garamond",serif;float:left;font-size:3.5rem;line-height:.72;
    padding:.32rem .5rem 0 0;color:var(--accent);font-weight:500;transition:color 1.2s}
  .omen{font-family:"Cormorant Garamond",serif;font-style:italic;color:var(--accent);
    text-align:center;margin:1.7rem auto;max-width:32rem;opacity:.92;transition:color 1.2s}
  .whisper{display:block;margin:1.1rem 0;padding-left:1rem;border-left:2px solid var(--accent-dim);
    color:var(--bone-dim);font-style:italic;font-family:"Spectral",serif}
  .whisper b{color:var(--accent);font-style:normal;font-weight:400;font-family:"Cormorant Garamond",serif;
    text-transform:uppercase;letter-spacing:.16em;font-size:.7rem;display:block;margin-bottom:.2rem}

  .prompt{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:1.3rem;color:var(--salt);text-align:center;margin:2.3rem 0 1.1rem}
  .choices{display:flex;flex-direction:column;gap:.85rem}
  .choice{appearance:none;text-align:left;cursor:pointer;color:var(--bone);
    background:linear-gradient(180deg,rgba(26,38,35,.85),rgba(15,24,22,.85));
    border:1px solid var(--rule);border-left:2px solid var(--accent-dim);border-radius:3px;
    padding:1rem 1.15rem 1.05rem 2.2rem;position:relative;font-family:"Spectral",serif;font-size:1.02rem;line-height:1.5;
    transition:border-color .25s,transform .2s,background .25s,box-shadow .25s}
  .choice .lab{display:block;font-family:"Cormorant Garamond",serif;font-weight:600;font-size:1.16rem;color:var(--salt);margin-bottom:.15rem}
  .choice .sub{color:var(--bone-dim);font-size:.96rem}
  .choice::before{content:"✦";position:absolute;left:.8rem;top:1.05rem;color:var(--accent);font-size:.85rem;opacity:.7;transition:opacity .25s,transform .25s}
  .choice.left::before{content:"☾"}      /* left-hand choices marked subtly */
  .choice:hover,.choice:focus-visible{border-left-color:var(--accent);border-color:var(--accent-dim);
    background:linear-gradient(180deg,rgba(34,48,44,.95),rgba(18,29,27,.95));
    box-shadow:0 10px 30px -16px color-mix(in srgb,var(--accent) 50%,transparent);transform:translateY(-1px);outline:none}

  .cover{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 1.25rem}
  .cover .series{font-family:"Cormorant Garamond",serif;text-transform:uppercase;letter-spacing:.4em;font-size:.72rem;color:var(--gold);margin-bottom:1.3rem}
  .cover .epigraph{max-width:30rem;color:var(--bone-dim);font-style:italic;font-family:"Cormorant Garamond",serif;font-size:1.22rem;line-height:1.5;margin:1.3rem auto 2rem}
  .btn{appearance:none;cursor:pointer;font-family:"Cormorant Garamond",serif;font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:.9rem;
    color:var(--ink);background:linear-gradient(180deg,#d8b876,var(--gold));border:0;border-radius:2px;padding:.95rem 2.1rem;
    box-shadow:0 12px 30px -12px color-mix(in srgb,var(--gold) 60%,transparent);transition:transform .2s,box-shadow .2s}
  .btn:hover,.btn:focus-visible{transform:translateY(-2px);outline:none}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent-dim);box-shadow:none}
  .credit{color:var(--bone-dim);font-size:.8rem;letter-spacing:.04em;margin-top:2.4rem;opacity:.7}

  .interlude{text-align:center}
  .interlude .tier-name{font-family:"Cormorant Garamond",serif;font-size:clamp(1.8rem,6vw,2.6rem);color:var(--accent);margin:.4rem 0 1rem;transition:color 1.2s}
  .savebox{margin:2rem auto 0;max-width:34rem;border:1px solid var(--rule);border-radius:3px;padding:1rem;background:rgba(8,12,11,.5)}
  .savebox h3{font-family:"Cormorant Garamond",serif;text-transform:uppercase;letter-spacing:.2em;font-size:.72rem;color:var(--accent);margin:0 0 .6rem}
  .savebox textarea{width:100%;background:#0c1413;color:var(--bone-dim);border:1px solid var(--rule);border-radius:2px;
    font-family:ui-monospace,monospace;font-size:.72rem;padding:.5rem;resize:vertical;min-height:3.4rem}
  .savebox .row{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap}
  .endnav{display:flex;gap:.9rem;justify-content:center;flex-wrap:wrap;margin-top:2.2rem}

  .modal{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:1.2rem;background:rgba(6,9,8,.8)}
  .modal-card{max-width:34rem;width:100%;background:linear-gradient(180deg,#16221f,#0c1413);border:1px solid var(--rule);border-radius:4px;padding:1.3rem;box-shadow:0 30px 70px -20px #000}
  .modal-card h3{font-family:"Cormorant Garamond",serif;text-transform:uppercase;letter-spacing:.2em;font-size:.78rem;color:var(--accent);margin:0 0 .5rem}
  .modal-card textarea{width:100%;background:#0c1413;color:var(--bone-dim);border:1px solid var(--rule);border-radius:2px;font-family:ui-monospace,monospace;font-size:.72rem;padding:.5rem;resize:vertical;min-height:4rem;margin-top:.4rem}
  .modal-card .row{display:flex;gap:.5rem;margin-top:.7rem}
  .fade{animation:rise .7s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .stagger>*{opacity:0;animation:rise .6s ease forwards}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.16s}.stagger>*:nth-child(3){animation-delay:.27s}
  @media(prefers-reduced-motion:reduce){.fade,.stagger>*{animation:none!important;opacity:1!important;transform:none!important}*{transition:none!important}}
  ::selection{background:color-mix(in srgb,var(--accent) 30%,transparent)}
</style>
</head>
<body data-tier="light">
<div id="scene-bg"></div><div id="scene-veil"></div>
<div class="topbar" id="topbar" style="display:none">
  <span class="name">The Book of the Raven</span>
  <span class="controls"><button id="readerBtn" class="gear" title="Reading settings" aria-label="Reading settings">Aa</button><button id="grimoireBtn" title="The Owens Grimoire">Grimoire</button><button id="saveBtn">Save</button><button id="restart">Begin again</button></span>
</div>
<div class="rpanel" id="rpanel" role="dialog" aria-label="Reading settings">
  <h4>Reading settings</h4>
  <p class="hint">Comfort only — saved on this device, and they never change your story.</p>
  <div class="rrow"><span class="rlab">Text size</span>
    <span class="sizer"><button id="rMinus" aria-label="Smaller text">A−</button><span class="val" id="rVal">Normal</span><button id="rPlus" aria-label="Larger text">A+</button></span></div>
  <div class="rrow"><span class="rlab">Calm mode<small>Keep the omens, drop the darkening haze</small></span>
    <button class="toggle" id="rCalm" role="switch" aria-pressed="false" aria-label="Calm mode"></button></div>
  <div class="rrow"><span class="rlab">Parchment theme<small>Warm light page for daytime reading</small></span>
    <button class="toggle" id="rParch" role="switch" aria-pressed="false" aria-label="Parchment theme"></button></div>
</div>
<nav id="thread" aria-hidden="true"></nav>
<main class="wrap" id="app"></main>

<script>
const CDN="https://d8j0ntlcm91z4.cloudfront.net/user_3F3JBI4btJ6q4R2Nk3V9o8hCYtd/";
const IMG={
  grimoire:"hf_20260627_125005_93e56ec5-0a34-4b20-beb6-fcfae92516fa.png",
  magician:"hf_20260627_135349_350b81b5-f82d-4c06-b3c2-563ec7607250.png",
  rosa:"hf_20260627_125007_03c0181d-1b3b-4d4a-9be6-15320d8f8a6f.png",
  strength:"hf_20260627_135402_e3b5c5a2-6b73-4c9d-b067-d3505fcb5a7b.png",
  star_blue:"hf_20260627_135758_4b83ef2a-8802-4206-a7a1-34bc89a2d4b8.png",
  star_dark:"hf_20260627_135350_b6c2c1da-a05d-4526-9497-bed25bed1668.png",
  aunt:"hf_20260626_171244_9fe99a75-9fc1-45a3-961b-5f877067b222.png",
  cardback:"hf_20260627_135403_ab0974a9-9f6f-4939-ab4f-006e17977304.png",
  t_clap:"hf_20260624_174614_a711d92f-d21b-41e4-b89c-223266e1ac93.png",
  t_lichen:"hf_20260624_190951_27a0317e-a69a-4ae4-a1e2-56bd329b261c.png",
  t_cobble:"hf_20260624_174620_6a61ef3f-4ccf-4019-a90b-30c2bd97e1a3.png",
  t_moss:"hf_20260624_190947_f457faa0-cc9a-4315-b973-a328594d209c.png"
};
const U=k=>CDN+IMG[k];

/* ——— STATE ——— */
let S={v:2,node:"a1_quiet",dark:0,returns:0,flags:{},sacrifices:[],thread:[]};
const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
function tier(d){return d<=0?"light":d<=2?"tempted":d<=5?"slipping":d<=8?"lefthand":"raven";}
function tierName(d){return {light:"In the Light",tempted:"Tempted",slipping:"Slipping",lefthand:"Left-Handed",raven:"The Raven's"}[tier(d)];}

/* world-omen lines keyed to how far left she's gone (shown subtly in scenes) */
const OMENS={
  light:["The lilacs by the gate keep to their season, for now."],
  tempted:["The rosemary at the gate has flowered a blue too dark for June, and only Kylie has noticed."],
  slipping:["The well water has begun to taste of salt, though the sea is forty miles off; the crow on the chimney will not meet her eye."],
  lefthand:["Her reflection lags a half-second behind her in the dark glass. The bees have gone silent in the lavender. When she weeps, lately, the tears come slow and will not fall."],
  raven:["The mirrors fog when she passes. The garden blackens at the roots she favours. The dead in the Owens plot have stopped answering when she brings the cake and the news."]
};
function omenLine(){const arr=OMENS[tier(S.dark)];return arr[0];}

/* ——— STORY ——— */
const story={
cover:{cover:true},

a1_quiet:{
  eyebrow:"Act One · i",
  title:"The Quiet Year",
  img:"star_blue", bg:"t_clap",
  text:[
    "A year is a long time in a family that counts its grief in graves. A year ago the worst of it had come and gone — the plague that wasn't named in any newspaper, the man who'd carried it, the season the Owens women paid for with two beloved lives and Sally's magic both. Now the man was gone, ruined and wandering, and the village that had nearly died of him was already half-forgetting; each May they still gathered to remember, and the rest of the year they remembered to forget.",
    "The house on Magnolia Street had settled into something like peace. Sally kept no magic anymore and seemed lighter for the lack of it, prickly and ordinary and quietly, accidentally happy with Ian, who had stayed; she had gone back to the work she loved, directing the Owens Library in town — the tilting old building that had once been the jail where the first Owens woman waited to be hanged. Gillian had married her gentle Ben Frye, and there was a baby now — Birdie, red-haired and serious as a small judge, who could already call the birds to the windowsill. Gillian herself had a way of going quiet sometimes, mid-sentence, as if she had stepped into a room in her own mind and found the door locked — there were years out west she never spoke of, years Sally had once feared were lost to bad men and worse circles, though Gillian seemed to remember almost none of them, and was mortified, always, by how little magic the family believed she had. Antonia was deep in her medical training at Harvard, a new mother herself, and pretended she wasn't tired. Vincent telephoned from France on Sundays. And the aunts, Franny and Jet, were in the Owens plot under good granite, where the family still brought them cake after every wedding and told them all the news, because in this family the dead are only quieter, never gone.",
    "Kylie should have been the happiest of all of them. The curse was broken; love no longer killed; she had Gideon, steady, funny, ordinary Gideon Barnes, who loved her without a single drop of fear. She was tall and tender and home from Harvard for the summer, and there was nothing left in the world to be afraid of.",
    "Except that she missed it. Not the harm — she was not a monster, whatever the town thought of Owens women. She missed the clarity. For one bright, terrible while she had stood on the left-handed side of magic, where a thing that was broken could simply be made unbroken, where a fever could be lifted off a child like a coat off a chair, where she had been, for the length of a held breath, powerful enough to fix anything. She had turned back. She had helped end the man who took her there. And she had never told a living soul how good it had felt to be that strong, or how often, a year on, she still reached for it in her sleep.",
    "It ran in the blood, the pull; she understood that now. Her great-grandfather Vincent — telephoning so brightly from France, as though he had never done anything darker in his life than play the piano, had stood exactly where she had stood, young and gifted and tempted by the left hand, and had been the only Owens with the nerve to turn from it and walk away. The others in the family who had heard the dark calling, the ones nobody discussed at dinner, had mostly answered.",
    "She was on the porch with Birdie that evening, the baby fretful and hot-cheeked with a tooth coming in, when she felt the old pull stir — that small, reasonable voice that had never entirely left her."
  ],

const app=document.getElementById("app"), sceneBg=document.getElementById("scene-bg"),
  topbar=document.getElementById("topbar"), threadEl=document.getElementById("thread");
let trail=[];
const SAVE_KEY="botr_save_v2", SCHEMA=2;
const PREF_KEY="botr_prefs_v1";
const RSTEPS=[{s:.92,n:"Small"},{s:1,n:"Normal"},{s:1.14,n:"Large"},{s:1.3,n:"Larger"}];
let prefs={size:1,calm:false,parchment:false};
function loadPrefs(){try{const v=localStorage.getItem(PREF_KEY);if(v)prefs=Object.assign(prefs,JSON.parse(v));}catch(e){}
  prefs.size=Math.max(0,Math.min(RSTEPS.length-1,prefs.size|0));}
function savePrefs(){try{localStorage.setItem(PREF_KEY,JSON.stringify(prefs));}catch(e){}}
function applyPrefs(){
  const step=RSTEPS[prefs.size]||RSTEPS[1];
  document.documentElement.style.setProperty("--rscale",step.s);
  document.body.classList.toggle("calm",!!prefs.calm);
  document.body.classList.toggle("parchment",!!prefs.parchment);
  const rv=document.getElementById("rVal");if(rv)rv.textContent=step.n;
  const c=document.getElementById("rCalm");if(c)c.setAttribute("aria-pressed",String(!!prefs.calm));
  const p=document.getElementById("rParch");if(p)p.setAttribute("aria-pressed",String(!!prefs.parchment));
}
function wireReader(){
  const panel=document.getElementById("rpanel"),btn=document.getElementById("readerBtn");
  btn.onclick=(e)=>{e.stopPropagation();panel.classList.toggle("open");};
  document.addEventListener("click",(e)=>{if(panel.classList.contains("open")&&!panel.contains(e.target)&&e.target!==btn)panel.classList.remove("open");});
  document.getElementById("rMinus").onclick=()=>{prefs.size=Math.max(0,prefs.size-1);savePrefs();applyPrefs();};
  document.getElementById("rPlus").onclick=()=>{prefs.size=Math.min(RSTEPS.length-1,prefs.size+1);savePrefs();applyPrefs();};
  document.getElementById("rCalm").onclick=()=>{prefs.calm=!prefs.calm;savePrefs();applyPrefs();};
  document.getElementById("rParch").onclick=()=>{prefs.parchment=!prefs.parchment;savePrefs();applyPrefs();};
}
const ACTS={
  act1_close:{label:"End of Act One", next:"a2_open", nextLabel:"Continue to Act Two", teaser:"Act Two — <i>the bill comes due on someone you love</i>."},
  act2_close:{label:"End of Act Two", next:"a_world_open", nextLabel:"Continue to Act Three", teaser:"Act Three — <i>the cost spreads past the family</i>."},
  act_world_close:{label:"End of Act Three", next:"a3_open", nextLabel:"Continue to Act Four", teaser:"Act Four — <i>the point of no return</i>."},
  act3_close:{label:"End of Act Four", next:null, nextLabel:null, teaser:"The roads beyond — and the eventual endings — are still being written. Your grimoire-code holds everything."}
};
function encodeS(s){return btoa(unescape(encodeURIComponent(JSON.stringify(s))));}
function decodeS(v){return JSON.parse(decodeURIComponent(escape(atob(v))));}
function migrate(o){const base={v:SCHEMA,node:"a1_quiet",dark:0,returns:0,flags:{},sacrifices:[],thread:[]};
  o=Object.assign({},base,o||{});o.flags=Object.assign({},o.flags||{});
  if(!Array.isArray(o.sacrifices))o.sacrifices=[];if(!Array.isArray(o.thread))o.thread=[];
  o.dark=Math.max(0,o.dark|0);o.v=SCHEMA;return o;}
function autosave(){try{localStorage.setItem(SAVE_KEY,encodeS(S));}catch(e){}}
function loadLocal(){try{const v=localStorage.getItem(SAVE_KEY);return v?migrate(decodeS(v)):null;}catch(e){return null;}}
function clearLocal(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
function resume(state){S=migrate(state);trail=[];applyTier();go(S.node);}

function applyTier(){document.body.dataset.tier=tier(S.dark);}
function setScene(bg){if(bg){sceneBg.style.backgroundImage=`url("${U(bg)}")`;sceneBg.style.opacity=.06;}else sceneBg.style.opacity=0;}
function drawThread(){
  threadEl.innerHTML="";const top=document.createElement("div");top.className="line";threadEl.appendChild(top);
  S.thread.forEach(t=>{const s=document.createElement("div");s.className="stitch"+(t.left?" dark":"");s.title=t.lab;threadEl.appendChild(s);
    const l=document.createElement("div");l.className="line";threadEl.appendChild(l);});
}
const plate=(k)=>`<figure class="plate"><img src="${U(k)}" alt="" loading="lazy"/></figure>`;
const paras=(arr,lead)=>arr.map((p,i)=>p.startsWith("<")?p:`<p${lead&&i===0?' class="lead"':''}>${p}</p>`).join("");

function go(id){
  const n=story[id];
  if(id==="cover"){renderCover();return;}
  trail.push(id);S.node=id;autosave();
  if(n.interlude){renderInterlude();return;}
  if(n.craft){renderCraft(id);return;}
  renderNode(id);
}
function choose(n,i){
  const c=n.choices[i];
  S.dark=Math.max(0,S.dark+(c.dark||0));
  if(c.set)Object.assign(S.flags,c.set);
  if(c.sacrifice)S.sacrifices.push(c.sacrifice);
  if(c.dark&&c.dark<0)S.returns++;
  S.thread.push({lab:c.lab.replace(/\.$/,""),left:!!c.left});
  applyTier();
  go(c.to);
}

function renderCover(){

  </section>`;
  if(saved)document.getElementById("continueBtn").onclick=()=>resume(saved);

}

function renderNode(id){
  const n=story[id];topbar.style.display="flex";setScene(n.bg);drawThread();

  const status=document.getElementById("craftStatus"), lay=document.getElementById("layBtn");
  const craftKind=arr=>arr.some(c=>c.hand==="reverse")?"reverse":arr.some(c=>c.hand==="left")?"left":"right";
  function refresh(){

    else if(kind==="left"){status.style.color="var(--accent)";status.innerHTML="The room goes a degree colder. You have reached for the left hand — and a working remembers the hand that made it.";lay.textContent=cf.layLabel||"Lay the working";}

    }else if(kind==="left"){
      const leftN=arr.filter(c=>c.hand==="left").length;
      S.dark=Math.max(0,S.dark+Math.min(5,(cf.leftDark||3)+(leftN-1)));
      S.flags.usedLeft=true;
      if(cf.leftSet)Object.assign(S.flags,cf.leftSet);
      if(cf.leftSacrifice)S.sacrifices.push(cf.leftSacrifice);
      S.thread.push({lab:"Reached for the left hand",left:true});
      applyTier();go(cf.leftTo);
    }else{
      S.flags.usedRight=true;
      if(cf.rightSet)Object.assign(S.flags,cf.rightSet);
      if(cf.rightSacrifice)S.sacrifices.push(cf.rightSacrifice);
      S.thread.push({lab:"Kept to the right hand",left:false});
      applyTier();go(cf.rightTo);
    }
  };
  scrollTop();
}
function renderInterlude(){
  topbar.style.display="flex";setScene("star_dark");sceneBg.style.opacity=.07;drawThread();applyTier();autosave();
  const cfg=ACTS[S.node]||ACTS.act1_close;
  const t=tier(S.dark);
  const read={
    light:"You walked the whole way on the right hand. You are tired in the body and clean in the blood. The house feels like the house. The dead still answer when you bring them cake. Whatever comes next, you meet it as yourself.",
    tempted:"You strayed only a step, and stepped back without thinking. But you have learned the shape of the door now, and a door you have noticed is a door you will notice again.",
    slipping:"You have been to the other side and come back lighter by something you loved. The well tastes of salt. You go on with a small cold place in you where a warmth used to be — and the knowledge that the second walk is shorter than the first.",
    lefthand:"You are good at this now, and being good at it has begun to cost the people around you, not only you. The crow is gone. Your reflection runs a half-step behind. You go on as someone the town has started, very quietly, to stand further away from.",
    raven:"You are most of the way to being what the book was waiting for. It is a kind of peace, the dark — it asks so little and gives so much, and only the people you love have to pay for it. You go on as the most powerful Owens woman alive, and the loneliest."
  }[t];
  const sac=S.sacrifices.length?`<p class="omen">Paid along the way: ${S.sacrifices.join("; ")}.</p>`:"";
  const code=encodeS(S);
  app.innerHTML=`<article class="interlude ${reduce?'':'fade'}">
    <header style="padding-top:3.2rem"><p class="eyebrow">${cfg.label}</p>
      <h2 class="chapter">Where You Stand</h2></header>
    ${plate("cardback")}
    <p class="tier-name">${tierName(S.dark)}</p>
    <div class="body" style="text-align:left">${paras([read],false)}${sac}
      <p class="omen">${omenLine()}</p>
      <p style="text-align:center;color:var(--bone-dim)">${cfg.teaser}</p>
    </div>
    ${cfg.next?`<div class="endnav"><button class="btn" id="nextBtn">${cfg.nextLabel}</button></div>`:""}
    <div class="savebox">
      <h3>Your progress is saved</h3>
      <p style="color:var(--bone-dim);font-size:.9rem;margin:.2rem 0 .5rem">This device remembers automatically. To carry your path to another device, copy this grimoire-code and paste it back in.</p>
      <textarea id="saveOut" readonly>${code}</textarea>
      <div class="row">
        <button class="btn ghost" id="copyBtn">Copy</button>
        <input id="loadIn" placeholder="paste a saved code…" style="flex:1;min-width:9rem;background:#0c1413;color:var(--bone);border:1px solid var(--rule);border-radius:2px;padding:.4rem .6rem;font-family:ui-monospace,monospace;font-size:.72rem"/>
        <button class="btn ghost" id="loadBtn">Resume</button>
      </div>
    </div>
    <div class="endnav"><button class="btn ghost" id="againBtn">Begin again</button></div>
  </article>`;
  if(cfg.next)document.getElementById("nextBtn").onclick=()=>go(cfg.next);
  document.getElementById("copyBtn").onclick=(e)=>copyText(document.getElementById("saveOut").value,e.target);
  document.getElementById("loadBtn").onclick=()=>{try{resume(decodeS(document.getElementById("loadIn").value.trim()));}catch(e){document.getElementById("loadBtn").textContent="Invalid";}};
  document.getElementById("againBtn").onclick=()=>{clearLocal();go("cover");};
  scrollTop();
}
function scrollTop(){window.scrollTo({top:0,behavior:reduce?"auto":"smooth"});}

document.getElementById("restart").onclick=()=>go("cover");
function copyText(t,btn){const done=()=>{if(btn)btn.textContent="Copied";};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done).catch(()=>fallbackCopy(t,done));}
  else fallbackCopy(t,done);}
function fallbackCopy(t,done){const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");}catch(e){}done();ta.remove();}
function grimoireModal(){
  const last=trail[trail.length-1];
  if(story[last]&&story[last].interlude)return;
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(S))));
  const ov=document.createElement("div");ov.className="modal";
  ov.innerHTML='<div class="modal-card"><h3>Save your path</h3><p style="color:var(--bone-dim);font-size:.9rem;margin:.2rem 0 0">Copy this to keep your path. Paste it back at the end of an act to resume. The dark remembers.</p><textarea readonly>'+code+'</textarea><div class="row"><button class="btn ghost" data-act="copy">Copy</button><button class="btn ghost" data-act="close">Close</button></div></div>';
  ov.addEventListener("click",ev=>{const a=ev.target.getAttribute&&ev.target.getAttribute("data-act");if(a==="copy")copyText(code,ev.target);if(a==="close"||ev.target===ov)ov.remove();});
  document.body.appendChild(ov);}
function grimoireBook(){
  const t=tier(S.dark), idx={light:0,tempted:1,slipping:2,lefthand:3,raven:4}[t]||0;
  const warnHead = idx>=3 ? "The Left Hand" : "The Left Hand — read, but do not reach";
  let darkPages="";
  if(idx>=2) darkPages+=`<p style="color:var(--gold);font-style:italic;margin-top:.5rem">The ink on these pages looks less like a warning tonight than like a recipe. You tell yourself you are only reading.</p>`;
  if(idx>=3) darkPages+=`<div class="recipe warn"><b>To send a bill out of sight</b><br/>Henbane to bind the cost, belladonna to choose the stranger, a drop of your own blood to seal it. The far-off cannot trace what they cannot see — clean hands, full heart, and a horizon that has agreed not to look back at you.</div>`;
  if(idx>=4) darkPages+=`<div class="recipe warn"><b>The last page — it is addressed to you</b><br/>You have stopped needing me to tell you how; you knew before you could read. Everything you love is a handle I can hold. Turn the page, and we need never be tired, or frightened, or ordinary, again. <i>— and it is signed in your own hand.</i></div>`;
  const ov=document.createElement("div");ov.className="modal";
  ov.innerHTML=`<div class="modal-card grim">
    <h3>The Owens Grimoire</h3>
    <p style="color:var(--bone-dim);font-size:.85rem;margin:.2rem 0 0">Copied hand to hand since Maria. Reading costs nothing — it is the <i>reaching</i> that is charged.</p>
    <h4>The First Rule</h4>
    <p>Magic has two hands. The <b>right hand</b> heals, mends, and protects, and does no harm; whatever it spends, the witch pays out of herself. The <b>left hand</b> — the Dark Art — takes what it wants and works at once, and nothing it gives is free. Use it only when you must, and know the price before you ask.</p>
    <p><i>The threefold law:</i> whatever you send into the world returns to you three times over — and not always to the hand that sent it.</p>
    <h4>Right-Hand Cures</h4>
    <div class="recipe"><b>Courage Tea</b><br/>Currants, thyme, and warming spices. For protection and healing — drink it when the work has worn you thin.</div>
    <div class="recipe"><b>To ward a fever</b><br/>Feverfew to turn the illness; rosemary and salt to dispel what has taken hold; a blue bead at the throat, for blue is protection.</div>
    <div class="recipe"><b>Protection</b><br/>Black cloth, red thread, clove, and blackthorn. Rosemary oil on the threshold, lavender in the pocket, and wear blue.</div>
    <div class="recipe"><b>To break a small hex</b><br/>Salt, lavender, lemon verbena, lemon juice, and a little coconut oil.</div>
    <div class="recipe"><b>Love Potion № 9</b><br/>Anise, rosemary, honey, and cloves, simmered nine hours on the back burner. The most asked-for cure — and the one to give most carefully.</div>
    <div class="recipe"><b>Black soap</b><br/>Brewed twice a year in the dark of the March moon and scented with lavender. It washes more than the hands.</div>
    <h4>Reading the Signs</h4>
    <p>A candle that burns blue means a spirit is near. Salt on the windowsill turns harm away. When the birds fall silent over one house alone, something in that house has changed. A reflection that runs a half-step behind its owner has begun to keep its own counsel.</p>
    <h4 style="color:var(--gold)">${warnHead}</h4>
    <div class="recipe warn"><b>The disquieting pantry</b><br/>Blood, for power that asks no leave. Belladonna and nightshade, for the sight. Wormwood, for divination. Henbane, to bind. Mandrake, the heart of all love potions. The heart of a dove. These work, and they work at once — and the bill falls, three times over, on the people you love.</div>
    <div class="recipe warn"><b>The Book of the Raven</b><br/>The left-handed grimoire, in a hand older than this family. It scalds an honest palm, and it goes, always, to the next woman who needs it. It has learned your name.</div>
    ${darkPages}
    <div class="row" style="margin-top:1.1rem"><button class="btn ghost" data-act="close">Close the book</button></div>
  </div>`;
  ov.addEventListener("click",ev=>{const a=ev.target.getAttribute&&ev.target.getAttribute("data-act");if(a==="close"||ev.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
document.getElementById("grimoireBtn").onclick=grimoireBook;
document.getElementById("saveBtn").onclick=grimoireModal;

loadPrefs();wireReader();applyPrefs();
go("cover");
</script>
</body>
</html>
